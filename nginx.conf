user www-data;
worker_processes auto;
error_log /var/log/nginx/error.log notice;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    log_format main '[$time_local] $proxy_protocol_addr "$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    set_real_ip_from 127.0.0.1;

    include /etc/nginx/mime.types;
    include /etc/nginx/conf.d/xray.conf;

    # ── HTTPS — proxy ke Node API (port 3306) ────────────────────────────────
    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/xray/xray.crt;
        ssl_certificate_key /etc/xray/xray.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # API doc — no auth needed at nginx level (handled in api.js)
        location = /api/doc.html {
            proxy_pass         http://127.0.0.1:3306;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Semua endpoint /api/* → Node.js
        location /api/ {
            proxy_pass         http://127.0.0.1:3306;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }
    }

    # ── HTTP redirect ke HTTPS (opsional, aktifkan jika diperlukan) ──────────
    # server {
    #     listen 80;
    #     server_name _;
    #     return 301 https://$host$request_uri;
    # }
}
